<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synctegron</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #0d0d1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.2rem;
            color: #a0a0b0;
            max-width: 600px;
            margin: 0 auto 2rem auto;
        }
        .games {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .game-card {
            background-color: #1a1a2e;
            padding: 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #2a2a3e;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
            border-color: #4facfe;
        }
        .game-card h2 {
            margin: 0 0 0.5rem 0;
            font-size: 1.5rem;
        }
        .game-card p {
            font-size: 0.9rem;
            margin: 0;
            color: #8a8a9a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Synctegron</h1>
        <p>Creating engaging mobile gaming experiences.</p>
        
        <div class="games">
            <a href="blockzap/privacy.html" class="game-card">
                <h2>BlockZap</h2>
                <p>Privacy Policy</p>
            </a>
        </div>
    </div>
</body>
</html>
